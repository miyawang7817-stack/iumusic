<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>塔罗占卜 · 探索你的命运</title>
  <meta name="description" content="纯前端塔罗牌抽卡占卜网站：5 种经典牌阵、3D 翻牌动画、78 张牌正逆位中文解读" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Barlow:wght@300;400;500&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="stars" aria-hidden="true"></div>

  <header class="app-header">
    <button class="brand" id="brand-btn" title="回到首页">
      <svg class="brand-icon" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="10" r="7"/>
        <path d="M8.5 18.5h7l1 2.5h-9z"/>
        <path d="M13.5 6.2l0.7 1.9 1.9 0.7-1.9 0.7-0.7 1.9-0.7-1.9-1.9-0.7 1.9-0.7z" fill="#fff" stroke="none"/>
        <path d="M9.4 10.6l0.45 1.2 1.2 0.45-1.2 0.45-0.45 1.2-0.45-1.2-1.2-0.45 1.2-0.45z" fill="#fff" stroke="none" opacity="0.8"/>
        <path d="M7.2 8.2a5 5 0 0 1 2.3-2.6" opacity="0.5"/>
      </svg>
      <span class="brand-name">塔罗</span>
    </button>
    <button class="back-btn" id="btn-back" hidden>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
      <span>返回</span>
    </button>
  </header>

  <main id="app">

    <!-- 首页：黑色全屏 hero（设计稿背景视频 + 星尘 + 三张倒扣牌入口） -->
    <section id="view-home" class="view">
      <video id="hero-video" src="assets/hero-bubble.mp4" poster="assets/hero-poster.webp" muted loop autoplay playsinline preload="auto" aria-hidden="true"></video>
      <div class="amb amb-home" aria-hidden="true"><i class="a1"></i><i class="a2"></i><i class="a3"></i><i class="a4"></i><i class="a5"></i></div>
      <div class="home-sky" id="home-sky" aria-hidden="true">
        <span class="meteor m1"></span>
        <span class="meteor m2"></span>
        <svg class="cons cl" width="150" height="110" viewBox="0 0 150 110">
          <polyline points="10,80 40,55 70,70 95,30 135,18" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.75"/>
          <circle cx="10" cy="80" r="2" fill="rgba(255,255,255,0.8)"/><circle cx="40" cy="55" r="1.3" fill="rgba(255,255,255,0.8)"/><circle cx="70" cy="70" r="2" fill="rgba(255,255,255,0.8)"/><circle cx="95" cy="30" r="1.3" fill="rgba(255,255,255,0.8)"/><circle cx="135" cy="18" r="2" fill="rgba(255,255,255,0.8)"/>
        </svg>
        <svg class="cons cr" width="150" height="110" viewBox="0 0 150 110">
          <polyline points="15,20 50,38 72,15 105,55 140,90" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.75"/>
          <circle cx="15" cy="20" r="2" fill="rgba(255,255,255,0.8)"/><circle cx="50" cy="38" r="1.3" fill="rgba(255,255,255,0.8)"/><circle cx="72" cy="15" r="2" fill="rgba(255,255,255,0.8)"/><circle cx="105" cy="55" r="1.3" fill="rgba(255,255,255,0.8)"/><circle cx="140" cy="90" r="2" fill="rgba(255,255,255,0.8)"/>
        </svg>
      </div>
      <div class="home-main">
        <p class="home-headline"><span>窥见</span><span>命运的</span><span>低语</span></p>
        <div class="home-entries" id="spread-grid"></div>
      </div>
      <p class="home-footline">星移 · 月转 · 牌不欺心</p>
    </section>

    <!-- 抽牌页：洗牌 + 扇形选牌 -->
    <section id="view-draw" class="view hidden">
      <div class="draw-header">
        <h2 id="draw-title"></h2>
      </div>
      <div class="ring-area" id="ring-area">
        <div class="amb" aria-hidden="true"><i class="a1"></i><i class="a2"></i><i class="a3"></i><i class="a4"></i><i class="a5"></i></div>
        <div class="ring-stage" id="ring-stage"></div>
      </div>
      <div class="draw-pos-wrap">
        <h3 class="draw-pos" id="draw-pos"></h3>
        <p id="draw-progress" class="draw-progress"></p>
      </div>
      <div class="drawn-tray" id="drawn-tray"></div>
      <div class="draw-actions">
        <button class="btn btn-ghost" id="btn-reshuffle">重新洗牌</button>
      </div>
    </section>

    <!-- 解读页：翻牌 + 牌义 -->
    <section id="view-reading" class="view hidden">
      <div class="reading-header">
        <h2 id="reading-title"></h2>
      </div>
      <div class="board" id="board"></div>
      <div class="reading-actions" id="reading-actions">
        <button class="btn btn-gold" id="btn-flip-all">✨ 全部翻开</button>
      </div>
      <div class="interpretations" id="interpretations"></div>
    </section>

  </main>

  <script src="js/data.js"></script>
  <script src="js/lore.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
