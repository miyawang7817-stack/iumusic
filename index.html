<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IU — Magazine</title>
  <meta name="description" content="IU discography — 专辑封面像一本书被风掀开，散落后聚成可旋转的封面轮盘" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>" />
  <link rel="stylesheet" href="css/style.css?v=14" />
</head>
<body>
  <div id="app">
    <header>
      <div class="h-block h1">
        <p>IU · 이지은</p>
        <p>Singer-Songwriter</p>
      </div>
      <div class="h-block h2">
        <p>Discography</p>
        <p>2008 — 2025</p>
      </div>
      <div class="h-block h3">
        <p>EDAM Entertainment</p>
        <p>Seoul, Korea</p>
      </div>
      <ul class="h-links">
        <li><a href="https://www.youtube.com/@dlwlrma" target="_blank" rel="noreferrer">YouTube</a></li>
        <li><a href="https://www.instagram.com/dlwlrma" target="_blank" rel="noreferrer">Instagram</a></li>
        <li><a href="https://open.spotify.com/artist/3HqSLMAZ3g3d5poNaI7GOU" target="_blank" rel="noreferrer">Spotify</a></li>
      </ul>
    </header>
    <footer>
      <div>IU</div>
      <div class="f-scroll">SCROLL</div>
    </footer>
  </div>

  <!-- WebGL 不可用时的封面墙备用方案（由脚本填充并显示） -->
  <div id="fallback" hidden></div>

  <!-- 专辑视图覆层：播放器卡片场之上的曲目信息与返回按钮 -->
  <div id="album-view" hidden>
    <button class="av-back" id="btn-ring-back"><i></i><span>BACK</span></button>
    <div class="av-info">
      <h2 class="av-title"></h2>
      <p class="av-meta"></p>
      <ol class="av-tracks"></ol>
    </div>
  </div>

  <!-- 手势控制 -->
  <button id="btn-gesture" title="摄像头手势控制"><i class="g-dot"></i><span>GESTURE</span></button>
  <video id="gesture-cam" playsinline muted hidden></video>
  <div id="gesture-dot" hidden></div>

  <!-- 正在播放条 -->
  <div id="now-playing" hidden>
    <button id="np-toggle">⏸</button>
    <span id="np-title"></span>
    <span class="np-tag">PREVIEW</span>
  </div>

  <canvas id="webgl"></canvas>
  <script type="module" src="js/magazine.js?v=14"></script>
</body>
</html>
