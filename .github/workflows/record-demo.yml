name: Record demo video

# 手动触发：Actions 页面点 Run workflow（或 API dispatch）。
# 在 GitHub 服务器上打开线上站点，虚拟时钟逐帧录制 → 配 IU 官方试听 → 发布为 demo-video Release
on:
  workflow_dispatch:
    inputs:
      url:
        description: 要录制的站点地址
        required: false
        default: https://miyawang7817-stack.github.io/iumusic/

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      SITE_URL: ${{ github.event.inputs.url || 'https://miyawang7817-stack.github.io/iumusic/' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装依赖（ffmpeg / 中日韩字体 / playwright）
        run: |
          sudo apt-get update -q
          # fonts-noto-cjk：修复韩文/中文渲染成方块（乱码）的问题
          sudo apt-get install -y -q ffmpeg python3-numpy fonts-noto-cjk fonts-noto-color-emoji
          sudo fc-cache -f
          echo "已安装 CJK 字体："; fc-list | grep -i "noto sans cjk" | head -3
          cd demo && npm init -y > /dev/null && npm install playwright > /dev/null

      - name: 生成备用配乐（抓不到 IU 音源时兜底）
        run: python3 demo/music.py demo/music.wav

      - name: 抓取 IU 官方试听音源
        continue-on-error: true
        run: node demo/soundtrack.mjs demo

      - name: 录制横版 1920x1080
        working-directory: demo
        run: node capture.mjs 1920 1080 fr169 "$SITE_URL"

      - name: 录制竖版 1080x1920
        working-directory: demo
        run: node capture.mjs 1080 1920 fr916 "$SITE_URL"

      - name: 合成音轨 + 编码
        run: |
          set -e
          # 音画同步：前 18.5s 静音（还没进播放页），18.5s 点 Celebrity 起 Celebrity，
          # 33s 点 LILAC 起 LILAC。preview1=Celebrity，preview2=LILAC（soundtrack.mjs 顺序）
          if [ -f demo/preview1.m4a ] && [ -f demo/preview2.m4a ]; then
            echo "配乐 = IU 官方试听（Celebrity → LILAC，前奏静音）"
            ffmpeg -y -i demo/preview1.m4a -i demo/preview2.m4a -filter_complex \
              "[0:a]atrim=0:14.5,afade=t=in:st=0:d=0.3[c];\
               [1:a]atrim=0:19,afade=t=in:st=0:d=0.6,afade=t=out:st=16:d=3[l];\
               [c][l]concat=n=2:v=0:a=1[cat];\
               [cat]adelay=18500|18500,aresample=44100[a]" \
              -map "[a]" -c:a pcm_s16le demo/track.wav -loglevel error
            AUDIO=demo/track.wav
          elif [ -f demo/preview1.m4a ]; then
            echo "配乐 = IU 官方试听（单曲，前奏静音）"
            ffmpeg -y -i demo/preview1.m4a -filter_complex \
              "[0:a]atrim=0:30,afade=t=out:st=27:d=3,adelay=18500|18500,aresample=44100[a]" \
              -map "[a]" -c:a pcm_s16le demo/track.wav -loglevel error
            AUDIO=demo/track.wav
          else
            echo "配乐 = 兜底 lo-fi（未抓到 IU 音源，前奏仍静音）"
            ffmpeg -y -i demo/music.wav -filter_complex \
              "[0:a]atrim=0:33,adelay=18500|18500,aresample=44100[a]" \
              -map "[a]" -c:a pcm_s16le demo/track.wav -loglevel error
            AUDIO=demo/track.wav
          fi
          echo "音轨信息："; ffprobe -v error -show_entries format=duration,format_name -of default=noprint_wrappers=1 "$AUDIO"
          for v in "fr169:iu-magazine-demo-h.mp4" "fr916:iu-magazine-demo-v.mp4"; do
            d=${v%%:*}; o=${v##*:}
            ffmpeg -y -framerate 30 -i demo/$d/f%05d.jpg -i "$AUDIO" \
              -filter_complex "[0:v]format=yuv420p[v];[1:a]apad,atrim=0:52[a]" \
              -map "[v]" -map "[a]" -c:v libx264 -crf 18 -preset medium -c:a aac -b:a 192k \
              -movflags +faststart "$o" -loglevel error
          done
          # 抽帧自检：Celebrity 播放中(26s)、LILAC 播放中(40s)，验证文字与曲名
          ffmpeg -y -ss 26 -i iu-magazine-demo-h.mp4 -frames:v 1 -q:v 3 check-frame-celebrity.jpg -loglevel error
          ffmpeg -y -ss 40 -i iu-magazine-demo-h.mp4 -frames:v 1 -q:v 3 check-frame-lilac.jpg -loglevel error
          ls -la iu-magazine-demo-*.mp4

      - name: 上传为运行产物
        uses: actions/upload-artifact@v4
        with:
          name: iu-magazine-demo
          path: |
            iu-magazine-demo-*.mp4
            check-frame-*.jpg
            demo/soundtrack.json

      - name: 发布为 Release（demo-video）
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="自动录制于 $SITE_URL（横版 1920x1080 + 竖版 1080x1920，30fps）"
          if [ -f demo/soundtrack.json ]; then
            NOTES="$NOTES%0A%0A配乐（IU 官方 30 秒试听）：%0A$(node -e "for(const s of require('./demo/soundtrack.json'))console.log('- '+s.artist+' — '+s.title)" | sed ':a;N;$!ba;s/\n/%0A/g')"
          fi
          gh release delete demo-video --cleanup-tag -y || true
          FILES="iu-magazine-demo-h.mp4 iu-magazine-demo-v.mp4 check-frame-celebrity.jpg check-frame-lilac.jpg"
          [ -f demo/soundtrack.json ] && FILES="$FILES demo/soundtrack.json"
          gh release create demo-video $FILES \
            --title "IU Magazine 演示视频" \
            --notes "$NOTES"
